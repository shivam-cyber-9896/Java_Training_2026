<!DOCTYPE html>
<html>
<head>
    <title>Product Stock Checker</title>
</head>
<body>

    <h2>Check Product Stock</h2>

    <form action="stock" method="get">
        <label>Enter Product ID:</label>
        <input type="number" name="productId" placeholder="Enter product ID" required>
        <br><br>
        <button type="submit">Check Stock</button>
    </form>

</body>
</html>
